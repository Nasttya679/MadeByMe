version: '3.9'

name: madebyme_stack 

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always

    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  madebyme_web:
    build:
      context: .
      dockerfile: Dockerfile

    image: madebyme:2.0 
    container_name: madebyme_app

    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

    env_file: .env
    environment:
      - ConnectionStrings__DefaultConnection=${DEFAULT_CONNECTION}

volumes:
  postgres_data:
